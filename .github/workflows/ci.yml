name: selenium TestNG CI

on:
  push:
     branches: [main]
  pull_request:
     branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: chekout code
        uses: actions/chekout@v4

      - name: setup jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'







